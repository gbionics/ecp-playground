[workspace]
authors = ["siddharth deore <siddharth.deore@gbionics.ai>"]
channels = ["conda-forge"]
name = "ecp-playground"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]



[tasks]
configure = { cmd = [
    "cmake",
    "-G", "Ninja",
    "-DCMAKE_BUILD_TYPE=Release",
    "-DCMAKE_INSTALL_PREFIX=$CMAKE_INSTALL_PREFIX",
    "-DEP_ENABLE_YARP=OFF",
    # The source is in the root directory
    "-S",
    ".",
    # We wanna build in the build directory
    "-B",
    "build",
]}
configure-test = { cmd = [
    "cmake",
    "-G", "Ninja",
    "-DCMAKE_BUILD_TYPE=Release",
    "-DCMAKE_INSTALL_PREFIX=$CMAKE_INSTALL_PREFIX",
    "-DBUILD_TESTING=ON",
    "-DEP_ENABLE_YARP=OFF",
    # The source is in the root directory
    "-S",
    ".",
    # We wanna build in the build directory
    "-B",
    "build",
]}
build = { cmd = "cmake --build build --config Release", depends-on = ["configure"] }
capabilities = { cmd = ["./scripts/apply-actuator-capabilities.sh", "build/actuator-test-spline"], depends-on = ["build"] }
run-actuator-test-spline = { cmd = ["./build/actuator-test-spline"], depends-on = ["capabilities"] }
gui-capabilities = { cmd = ["./scripts/apply-actuator-capabilities.sh", "build/gui/actuator-test-gui"], depends-on = ["build"] }
run-gui = { cmd = ["./build/gui/actuator-test-gui"], depends-on = ["gui-capabilities"] }
install = { cmd = ["cmake", "--install", "build", "--config", "Release"], depends-on = ["build"] }
test = { cmd = "cmake --build build --config Release && ctest --build-config Release --output-on-failure --test-dir build", depends-on = ["configure-test"] }
format = { cmd = "clang-format -i $(git ls-files '*.cpp' '*.h' '*.cxx' '*.hpp')" }

[dependencies]
clang-format = "*"
tomlplusplus = "*"
soem = "*"
cmake = "*"
ninja = "*"
cxx-compiler = "*"
qt6-main = ">=6.11.1,<7"
matplotlib = ">=3.11.0,<4"
pandas = ">=3.0.3,<4"
